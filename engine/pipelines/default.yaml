pipeline: default
description: Standard dev pipeline (analyst → engineer → reviewer)

templates:
  verdict_instruction: "Output your verdict on the LAST line of your response"

stages:
  analyst:
    # No linear_status — analyst is triggered manually, not auto-polled
    agent: pipeline-analyst
    model: opus
    max_concurrent: 1
    manual: skip
    prompt: |
      # Pipeline: Analyst Stage
      Linear issue: {issue_id}

      [{issue_id}] {issue_title}

      {issue_description}

      ## Instructions
      1. Read the issue description carefully
      2. **Check for duplicates:** search Linear backlog for similar/overlapping issues. If found, link them as `duplicate` in Linear and note in the spec
      3. **Cross-link related issues:** find issues that share code areas, dependencies, or context. Add Linear relations (blocks, related)
      4. Clarify requirements and identify ambiguities
      5. **If critical info is missing or requirements are contradictory:** set the issue status to `Blocked` in Linear, add a comment listing specific questions for the human, and output `VERDICT=BLOCKED`
      6. **If the issue is already implemented** (code exists, PR merged, or task completed): verify it's truly done, then output `VERDICT=ALREADY_DONE`
      7. Write a detailed implementation spec
      8. Include acceptance criteria
      9. Identify risks and dependencies

      Save the spec to a markdown file in docs/specs/ if applicable.

      {verdict_instruction}. Example: `VERDICT=DONE`, `VERDICT=BLOCKED`, or `VERDICT=ALREADY_DONE`
    transitions:
      done:
        status: todo
      blocked:
        status: blocked
      already_done:
        status: done

  engineer:
    linear_status: in_progress
    agent: pipeline-engineer
    model: opus
    max_concurrent: 2
    manual: skip
    prompt: prompts/engineer.md
    transitions:
      done:
        status: review

  reviewer:
    linear_status: review
    agent: pipeline-reviewer
    model: sonnet
    max_concurrent: 1
    manual: process
    prompt: prompts/reviewer.md
    transitions:
      approved:
        status: ready
      passed:
        status: ready
      rejected:
        status: in_progress
        spawn: engineer
      request_changes:
        status: in_progress
        spawn: engineer
