name: Feature Request
description: Suggest a new feature or improvement for Werma
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to improve Werma? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve? Why do you need it?
      placeholder: "I often need to run multiple agents on different repos simultaneously, but..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this work? Be as specific as you like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried or thought of.

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of Werma does this affect?
      options:
        - CLI commands
        - Pipeline / stages
        - Daemon
        - Scheduling
        - Issue tracker integration
        - Agent execution (tmux/runtime)
        - Configuration
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Examples, mockups, links to related issues, etc.
