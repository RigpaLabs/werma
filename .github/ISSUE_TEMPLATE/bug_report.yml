name: Bug Report
description: Report a bug or unexpected behavior in Werma
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below.

  - type: input
    id: version
    attributes:
      label: Werma version
      description: Output of `werma --version`
      placeholder: "v0.48.1"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux (x86_64)
        - Linux (aarch64)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: "When I run `werma run-all`, tasks stay in 'pending' state..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run `werma add "test" -t research`
        2. Run `werma run`
        3. Observe error in `~/.werma/logs/daemon.log`
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant output from `~/.werma/logs/daemon.log` or terminal.
      render: text

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might help (config, screenshots, related issues).
