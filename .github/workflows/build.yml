name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (aarch64-apple-darwin)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build release binary
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          WERMA_GIT_VERSION="${GITHUB_REF_NAME:-$GIT_HASH}" cargo build --release --target aarch64-apple-darwin

      - name: Package binary
        working-directory: .
        run: |
          cp engine/target/aarch64-apple-darwin/release/werma werma
          tar czf werma-aarch64-apple-darwin.tar.gz werma
          shasum -a 256 werma-aarch64-apple-darwin.tar.gz > werma-aarch64-apple-darwin.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: werma-aarch64-apple-darwin
          path: |
            werma-aarch64-apple-darwin.tar.gz
            werma-aarch64-apple-darwin.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG".."$TAG" --pretty=format:"- %s" | grep -E '^- (feat|fix|perf|refactor|docs|chore|ci|test)' || true)
          else
            COMMITS=$(git log --pretty=format:"- %s" | grep -E '^- (feat|fix|perf|refactor|docs|chore|ci|test)' || true)
          fi

          {
            echo 'notes<<NOTES_EOF'
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "# macOS (Apple Silicon)"
            echo "curl -sSL https://github.com/RigpaLabs/werma/releases/download/${TAG}/werma-aarch64-apple-darwin.tar.gz | tar xz"
            echo "mv werma ~/.local/bin/"
            echo '```'
            echo ""
            echo "Or use \`werma update\` to self-update."
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            werma-*.tar.gz
            werma-*.tar.gz.sha256
          draft: false
          prerelease: false
