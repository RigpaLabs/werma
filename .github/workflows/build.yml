name: Build & Release (manual)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.5.1)'
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (aarch64-apple-darwin)
    runs-on: macos-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Setup Rust
        run: |
          rustup show
          rustup target add aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build release binary
        run: |
          WERMA_GIT_VERSION="${{ inputs.tag }}" cargo build --release --target aarch64-apple-darwin

      - name: Package binary
        working-directory: .
        run: |
          cp engine/target/aarch64-apple-darwin/release/werma werma
          tar czf werma-aarch64-apple-darwin.tar.gz werma
          shasum -a 256 werma-aarch64-apple-darwin.tar.gz > werma-aarch64-apple-darwin.tar.gz.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          files: |
            werma-aarch64-apple-darwin.tar.gz
            werma-aarch64-apple-darwin.tar.gz.sha256
