name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: werma-aarch64-apple-darwin
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: werma-x86_64-apple-darwin
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: werma-x86_64-unknown-linux-gnu
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Build release binary
        run: |
          GIT_HASH=$(git rev-parse --short HEAD)
          WERMA_GIT_VERSION="$GIT_HASH" cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/werma ../werma
          cd ..
          tar czf ${{ matrix.artifact }}.tar.gz werma
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")

          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG".."$TAG" --pretty=format:"- %s" | grep -E '^- (feat|fix|perf|refactor|docs|chore|ci|test)' || true)
          else
            COMMITS=$(git log --pretty=format:"- %s" | grep -E '^- (feat|fix|perf|refactor|docs|chore|ci|test)' || true)
          fi

          {
            echo 'notes<<NOTES_EOF'
            echo "## What's Changed"
            echo ""
            echo "$COMMITS"
            echo ""
            echo "## Install"
            echo ""
            echo '```bash'
            echo "# macOS (Apple Silicon)"
            echo "curl -sSL https://github.com/RigpaLabs/werma/releases/download/${TAG}/werma-aarch64-apple-darwin.tar.gz | tar xz"
            echo "mv werma ~/.local/bin/"
            echo ""
            echo "# macOS (Intel)"
            echo "curl -sSL https://github.com/RigpaLabs/werma/releases/download/${TAG}/werma-x86_64-apple-darwin.tar.gz | tar xz"
            echo "mv werma ~/.local/bin/"
            echo ""
            echo "# Linux (x86_64)"
            echo "curl -sSL https://github.com/RigpaLabs/werma/releases/download/${TAG}/werma-x86_64-unknown-linux-gnu.tar.gz | tar xz"
            echo "mv werma ~/.local/bin/"
            echo '```'
            echo ""
            echo "Or use \`werma update\` to self-update."
            echo 'NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: ${{ steps.notes.outputs.notes }}
          files: |
            werma-*.tar.gz
            werma-*.tar.gz.sha256
          draft: false
          prerelease: false
