name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - name: Setup Rust
        run: rustup show
      - name: Format
        run: cargo fmt --check

  clippy-test:
    name: Clippy · Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
