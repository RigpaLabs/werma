name: Release

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - '.github/workflows/release.yml'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    name: Auto-version & Tag
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      changelog: ${{ steps.bump.outputs.changelog }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest tag
        id: latest_tag
        run: |
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $TAG"

      - name: Parse commits & determine bump
        id: bump
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          echo "Analyzing commits since $LATEST_TAG..."

          # Get commits since last tag
          COMMITS=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          if [ -z "$COMMITS" ]; then
            echo "No new commits since $LATEST_TAG"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Commits:"
          echo "$COMMITS"

          # Determine bump type from conventional commits
          BUMP="none"
          CHANGELOG=""

          # Check for breaking changes (major bump — but we stay in 0.x for now)
          if echo "$COMMITS" | grep -qE '^(feat|fix|refactor|perf)!:|BREAKING CHANGE:'; then
            BUMP="minor"
          fi

          # Check for features (minor bump)
          FEATS=$(echo "$COMMITS" | grep -E '^feat(\(.+\))?:' || true)
          if [ -n "$FEATS" ]; then
            BUMP="minor"
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG="${CHANGELOG:+${CHANGELOG}\n}- ${line}"
            done <<< "$FEATS"
          fi

          # Check for fixes (patch bump, unless already minor)
          FIXES=$(echo "$COMMITS" | grep -E '^fix(\(.+\))?:' || true)
          if [ -n "$FIXES" ]; then
            [ "$BUMP" = "none" ] && BUMP="patch"
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG="${CHANGELOG:+${CHANGELOG}\n}- ${line}"
            done <<< "$FIXES"
          fi

          # Check for perf (patch bump)
          PERFS=$(echo "$COMMITS" | grep -E '^perf(\(.+\))?:' || true)
          if [ -n "$PERFS" ]; then
            [ "$BUMP" = "none" ] && BUMP="patch"
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG="${CHANGELOG:+${CHANGELOG}\n}- ${line}"
            done <<< "$PERFS"
          fi

          # Squash merge fallback: "RIG-XX: description" without conventional prefix → patch bump
          # GitHub squash merges use PR title as commit message; this catches old-style titles
          SQUASH_RIGS=$(echo "$COMMITS" | grep -E '^RIG-[0-9]+:' | grep -vE '^(feat|fix|refactor|perf|docs|chore|ci|test|style)(\(.+\))?:' || true)
          if [ -n "$SQUASH_RIGS" ]; then
            [ "$BUMP" = "none" ] && BUMP="patch"
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG="${CHANGELOG:+${CHANGELOG}\n}- ${line}"
            done <<< "$SQUASH_RIGS"
          fi

          # Other conventional commits (docs, refactor, chore, ci, test) — no version bump
          OTHERS=$(echo "$COMMITS" | grep -E '^(docs|refactor|chore|ci|test|style)(\(.+\))?:' || true)
          if [ -n "$OTHERS" ]; then
            while IFS= read -r line; do
              [ -n "$line" ] && CHANGELOG="${CHANGELOG:+${CHANGELOG}\n}- ${line}"
            done <<< "$OTHERS"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "No version-bumping commits found"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Parse current version from tag
          CURRENT="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Apply bump
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          TAG="v${NEW_VERSION}"

          echo "Bump: $BUMP ($CURRENT -> $NEW_VERSION)"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

          # Write changelog to file for multi-line output
          printf '%b\n' "$CHANGELOG" > /tmp/changelog.md
          {
            echo 'changelog<<CHANGELOG_EOF'
            cat /tmp/changelog.md
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create tag
        if: steps.bump.outputs.skipped != 'true'
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          echo "Created and pushed tag: $TAG"

      - name: Create GitHub Release
        if: steps.bump.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          AUTO_CHANGELOG="${{ steps.bump.outputs.changelog }}"

          # Find the merged PR number from the squash-merge commit message
          PR_NUM=$(git log -1 --pretty=format:'%s' | grep -oE '#[0-9]+' | head -1 | tr -d '#')

          RELEASE_NOTES=""

          if [ -n "$PR_NUM" ]; then
            echo "Found PR #${PR_NUM}, checking for custom changelog..."
            PR_BODY=$(gh pr view "$PR_NUM" --json body --jq .body 2>/dev/null || true)

            if [ -n "$PR_BODY" ]; then
              # Extract ## Changelog section from PR body
              CUSTOM_NOTES=$(echo "$PR_BODY" | sed -n '/^## Changelog/,/^## /{ /^## Changelog/d; /^## /d; p; }')
              # Trim leading/trailing whitespace
              CUSTOM_NOTES=$(echo "$CUSTOM_NOTES" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' | sed '/^$/d')

              if [ -n "$CUSTOM_NOTES" ]; then
                echo "Using custom changelog from PR body"
                RELEASE_NOTES="$CUSTOM_NOTES"
              fi
            fi
          fi

          # Fall back to auto-generated changelog from commits
          if [ -z "$RELEASE_NOTES" ]; then
            echo "Using auto-generated changelog from commits"
            RELEASE_NOTES="$AUTO_CHANGELOG"
          fi

          gh release create "$TAG" --title "$TAG" --notes "$RELEASE_NOTES"
          echo "Created GitHub Release: $TAG"

      - name: Extract Linear issue references
        if: steps.bump.outputs.skipped != 'true'
        id: linear_issues
        run: |
          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          TAG="${{ steps.bump.outputs.tag }}"

          # Find RIG-XX references in commit messages since last tag
          ISSUES=$(git log "$LATEST_TAG"..HEAD --pretty=format:"%s %b" | grep -oE 'RIG-[0-9]+' | sort -u | tr '\n' ',' | sed 's/,$//')
          echo "issues=$ISSUES" >> "$GITHUB_OUTPUT"
          echo "Linear issues in this release: $ISSUES"

      - name: Label Linear issues with release version
        if: steps.bump.outputs.skipped != 'true' && steps.linear_issues.outputs.issues != ''
        env:
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: |
          TAG="${{ steps.bump.outputs.tag }}"
          ISSUES="${{ steps.linear_issues.outputs.issues }}"
          TEAM_ID="d199cc43-40ef-4e63-9caa-467506b781f6"

          if [ -z "$LINEAR_API_KEY" ]; then
            echo "LINEAR_API_KEY not set, skipping Linear labeling"
            exit 0
          fi

          # Ensure the release label exists (create if needed)
          LABEL_NAME="released:${TAG}"

          # Create label via Linear API
          LABEL_RESULT=$(curl -s -X POST https://api.linear.app/graphql \
            -H "Authorization: $LINEAR_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { issueLabelCreate(input: { name: \\\"${LABEL_NAME}\\\", teamId: \\\"${TEAM_ID}\\\", color: \\\"#10B981\\\" }) { success issueLabel { id } } }\"}")

          LABEL_ID=$(echo "$LABEL_RESULT" | jq -r '.data.issueLabelCreate.issueLabel.id // empty')

          # If label already exists, find it
          if [ -z "$LABEL_ID" ]; then
            LABEL_ID=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issueLabels(filter: { name: { eq: \\\"${LABEL_NAME}\\\" }, team: { id: { eq: \\\"${TEAM_ID}\\\" } } }) { nodes { id } } }\"}" \
              | jq -r '.data.issueLabels.nodes[0].id // empty')
          fi

          if [ -z "$LABEL_ID" ]; then
            echo "Could not create or find label ${LABEL_NAME}, skipping"
            exit 0
          fi

          echo "Label: ${LABEL_NAME} (${LABEL_ID})"

          # Apply label to each referenced issue
          IFS=',' read -ra ISSUE_ARRAY <<< "$ISSUES"
          for ISSUE_ID in "${ISSUE_ARRAY[@]}"; do
            # Look up issue by identifier (e.g. RIG-59)
            ISSUE_UUID=$(curl -s -X POST https://api.linear.app/graphql \
              -H "Authorization: $LINEAR_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{\"query\": \"{ issues(filter: { team: { id: { eq: \\\"${TEAM_ID}\\\" } }, number: { eq: ${ISSUE_ID#RIG-} } }) { nodes { id } } }\"}" \
              | jq -r '.data.issues.nodes[0].id // empty')

            if [ -n "$ISSUE_UUID" ]; then
              curl -s -X POST https://api.linear.app/graphql \
                -H "Authorization: $LINEAR_API_KEY" \
                -H "Content-Type: application/json" \
                -d "{\"query\": \"mutation { issueAddLabel(id: \\\"${ISSUE_UUID}\\\", labelId: \\\"${LABEL_ID}\\\") { success } }\"}" > /dev/null
              echo "  Labeled ${ISSUE_ID} with ${LABEL_NAME}"
            else
              echo "  Issue ${ISSUE_ID} not found, skipping"
            fi
          done
