name: E2E Tests

on:
  workflow_dispatch: # manual only initially

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.E2E_GITHUB_TOKEN }}
      LINEAR_API_KEY: ${{ secrets.E2E_LINEAR_API_KEY }}
      WERMA_E2E: '1'
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      # GH_TOKEN enables gh CLI, but git push needs HTTPS credential helper
      - run: gh auth setup-git

      - name: Configure git identity
        run: |
          git config --global user.email "e2e@rigpalabs.dev"
          git config --global user.name "Werma E2E"

      - name: Run e2e tests
        working-directory: engine
        run: cargo test --features e2e -- --test-threads=1
